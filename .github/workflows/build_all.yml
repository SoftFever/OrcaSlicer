name: Build all



on:

  push:

    branches:

      - main

      - release/*

    paths:

      - 'deps/**'

      - 'src/**'

      - '**/CMakeLists.txt'

      - 'version.inc'

      - 'localization/**'

      - 'resources/**'

      - ".github/workflows/build_*.yml"



  pull_request:

    branches:

      - main

      - release/*

    paths:

      - 'deps/**'

      - 'src/**'

      - '**/CMakeLists.txt'

      - 'version.inc'

      - ".github/workflows/build_*.yml"

      - 'BuildLinux.sh'

      - 'build_release_vs2022.bat'

      - 'build_release_macos.sh'



  workflow_dispatch:

    inputs:

      build-deps-only:

        description: 'Only build dependencies (bypasses caching)'

        type: boolean

        default: false



concurrency:

  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

  cancel-in-progress: true



jobs:

  build_deps:

    name: Build Dependencies

    strategy:

      fail-fast: false

      matrix:

        include:

          - os: ubuntu-20.04

          - os: ubuntu-24.04

          - os: windows-latest

          - os: macos-14

            arch: x86_64

          - os: macos-14

            arch: arm64

          - os: ubuntu-24.04-arm

            arch: arm64

    runs-on: ${{ matrix.os }}

    outputs:

      cache-key: deps-${{ matrix.os }}-${{ matrix.arch || 'x86_64' }}-${{ github.sha }}

      cache-path: ${{ github.workspace }}/deps/build

    

    steps:

      - name: Checkout

        uses: actions/checkout@v4

        with:

          lfs: 'true'



      - name: Load cached deps

        uses: actions/cache@v4

        with:

          path: ${{ github.workspace }}/deps/build

          key: deps-${{ matrix.os }}-${{ matrix.arch || 'x86_64' }}-${{ github.sha }}

          restore-keys: |

            deps-${{ matrix.os }}-${{ matrix.arch || 'x86_64' }}-



      - uses: lukka/get-cmake@latest

        with:

          cmakeVersion: "~3.28.0"



      - name: Setup dev on Windows

        if: matrix.os == 'windows-latest'

        uses: microsoft/setup-msbuild@v2



      - name: Get the date on Ubuntu and macOS

        if: matrix.os != 'windows-latest'

        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_ENV

        shell: bash



      - name: Get the date on Windows

        if: matrix.os == 'windows-latest'

        run: echo "date=$(Get-Date -Format 'yyyyMMdd')" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

        shell: pwsh



      # Build Dependencies

      - name: Build on Windows

        if: matrix.os == 'windows-latest'

        working-directory: ${{ github.workspace }}

        run: |

          choco install strawberryperl

          .\build_release_vs2022.bat deps

          .\build_release_vs2022.bat pack

          cd ${{ github.workspace }}/deps/build



      - name: Build on Mac

        if: matrix.os == 'macos-14'

        working-directory: ${{ github.workspace }}

        run: |

          brew install automake texinfo ninja libtool

          brew list

          mkdir -p ${{ github.workspace }}/deps/build_${{ matrix.arch }}

          mkdir -p ${{ github.workspace }}/deps/build_${{ matrix.arch }}/OrcaSlicer_dep_${{ matrix.arch }}

          brew uninstall --ignore-dependencies zstd

          ./build_release_macos.sh -dpx -a ${{ matrix.arch }} -t 10.15 -1

          brew install zstd



      - name: Install Ubuntu Build Dependencies

        if: contains(matrix.os, 'ubuntu')

        working-directory: ${{ github.workspace }}

        run: |

          sudo apt-get update

          sudo apt-get install -y cmake git g++ build-essential libgl1-mesa-dev m4 \

          libwayland-dev libxkbcommon-dev wayland-protocols extra-cmake-modules pkgconf \

          libglu1-mesa-dev libcairo2-dev libgtk-3-dev libsoup2.4-dev \

          libwebkit2gtk-${{ matrix.os == 'ubuntu-20.04' && '4.0' || '4.1' }}-dev \

          libgstreamer1.0-dev libgstreamer-plugins-good1.0-dev libgstreamer-plugins-base1.0-dev \

          gstreamer1.0-plugins-bad libosmesa6-dev wget sudo autoconf curl libunwind-dev texinfo



      - name: Build on Ubuntu

        if: contains(matrix.os, 'ubuntu')

        working-directory: ${{ github.workspace }}

        run: |

          mkdir -p ${{ github.workspace }}/deps/build

          mkdir -p ${{ github.workspace }}/deps/build/destdir

          sudo ./BuildLinux.sh -ur

          sudo chown $USER -R ./

          ./BuildLinux.sh -dr

          cd deps/build

          tar -czvf OrcaSlicer_dep_ubuntu_$(date +"%Y%m%d").tar.gz destdir



      # Upload Artifacts

      - name: Upload Mac artifacts

        if: matrix.os == 'macos-14'

        uses: actions/upload-artifact@v4

        with:

          name: OrcaSlicer_dep_mac_${{ matrix.arch }}_${{ env.date }}

          path: ${{ github.workspace }}/deps/build_${{ matrix.arch }}/OrcaSlicer_dep*.tar.gz



      - name: Upload Windows artifacts

        if: matrix.os == 'windows-latest'

        uses: actions/upload-artifact@v4

        with:

          name: OrcaSlicer_dep_win64_${{ env.date }}

          path: ${{ github.workspace }}/deps/build/OrcaSlicer_dep*.zip



      - name: Upload Ubuntu artifacts

        if: contains(matrix.os, 'ubuntu')

        uses: actions/upload-artifact@v4

        with:

          name: OrcaSlicer_dep_ubuntu_${{ matrix.os }}_${{ env.date }}

          path: ${{ github.workspace }}/deps/build/OrcaSlicer_dep_ubuntu_*.tar.gz



  build_orca:

    name: Build OrcaSlicer

    needs: build_deps

    if: ${{ !cancelled() && !inputs.build-deps-only }}

    strategy:

      fail-fast: false

      matrix:

        include:

          - os: ubuntu-20.04

          - os: ubuntu-24.04

          - os: windows-latest

          - os: macos-14

            arch: x86_64

          - os: macos-14

            arch: arm64

          - os: ubuntu-24.04-arm

            arch: arm64

    uses: ./.github/workflows/build_orca.yml

    with:

      cache-key: deps-${{ matrix.os }}-${{ matrix.arch || 'x86_64' }}-${{ github.sha }}

      cache-path: ${{ github.workspace }}/deps/build

      os: ${{ matrix.os }}

      arch: ${{ matrix.arch || 'x86_64' }}

    secrets: inherit
