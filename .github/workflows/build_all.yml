name: Build all

on:
  push:
    branches:
      - main
      - release/*
    paths:
      - 'deps/**'
      - 'src/**'
      - '**/CMakeLists.txt'
      - 'version.inc'
      - 'localization/**'
      - 'resources/**'
      - ".github/workflows/build_*.yml"

  pull_request:
    branches:
      - main
      - release/*
    paths:
      - 'deps/**'
      - 'src/**'
      - '**/CMakeLists.txt'
      - 'version.inc'
      - ".github/workflows/build_*.yml"
      - 'BuildLinux.sh'
      - 'build_release_vs2022.bat'
      - 'build_release_macos.sh'

  workflow_dispatch:
    inputs:
      build-deps-only:
        description: 'Only build dependencies (bypasses caching)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_all:
    name: Build All
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-20.04
          - os: ubuntu-24.04
          - os: windows-latest
          - os: macos-14
            arch: x86_64
          - os: macos-14
          - os: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: 'true'

      - name: Load cached deps
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/deps/build
          key: ${{ runner.os }}-deps-${{ hashFiles('**/CMakeLists.txt', 'deps/**') }}

      - name: Get CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.28.0"

      - name: Setup dev on Windows
        if: matrix.os == 'windows-latest'
        uses: microsoft/setup-msbuild@v2

      - name: Get the date
        shell: bash
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_ENV

      # Build Dependencies
      - name: Build on Windows
        if: matrix.os == 'windows-latest'
        working-directory: ${{ github.workspace }}
        run: |
          choco install strawberryperl -y
          ./build_release_vs2022.bat deps
          ./build_release_vs2022.bat pack

      - name: Build on Mac
        if: matrix.os == 'macos-14'
        working-directory: ${{ github.workspace }}
        run: |
          brew install automake texinfo ninja libtool
          mkdir -p deps/build_${{ matrix.arch }}
          mkdir -p deps/build_${{ matrix.arch }}/OrcaSlicer_dep_${{ matrix.arch }}
          brew uninstall --ignore-dependencies zstd
          ./build_release_macos.sh -dpx -a ${{ matrix.arch }} -t 10.15 -1
          brew install zstd

      - name: Install Ubuntu Build Dependencies
        if: contains(matrix.os, 'ubuntu')
        working-directory: ${{ github.workspace }}
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake git g++ build-essential libgl1-mesa-dev m4 \
            libwayland-dev libxkbcommon-dev wayland-protocols extra-cmake-modules pkgconf \
            libglu1-mesa-dev libcairo2-dev libgtk-3-dev libsoup2.4-dev \
            libgstreamer1.0-dev libgstreamer-plugins-good1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-bad libosmesa6-dev wget autoconf curl libunwind-dev texinfo

      - name: Build on Ubuntu
        if: contains(matrix.os, 'ubuntu')
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p deps/build/destdir
          sudo ./BuildLinux.sh -ur
          sudo chown $USER -R ./
          ./BuildLinux.sh -dr
          cd deps/build
          tar -czvf OrcaSlicer_dep_ubuntu_$(date +"%Y%m%d").tar.gz destdir

      # Upload Artifacts
      - name: Upload Mac artifacts
        if: matrix.os == 'macos-14'
        uses: actions/upload-artifact@v4
        with:
          name: OrcaSlicer_dep_mac_${{ matrix.arch }}_${{ env.date }}
          path: deps/build_${{ matrix.arch }}/OrcaSlicer_dep*.tar.gz

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: OrcaSlicer_dep_win64_${{ env.date }}
          path: deps/build/OrcaSlicer_dep*.zip

      - name: Upload Ubuntu artifacts
        if: contains(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@v4
        with:
          name: OrcaSlicer_dep_${{ matrix.os }}_${{ env.date }}
          path: deps/build/OrcaSlicer_dep_ubuntu_*.tar.gz

  build_orca:
    name: Build OrcaSlicer
    needs: [build_all]
    if: ${{ !cancelled() && !github.event.inputs.build-deps-only }}
    uses: ./.github/workflows/build_orca.yml
    with:
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
    secrets: inherit
